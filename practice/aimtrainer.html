<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Aim Trainer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: Arial, sans-serif;
            background: #1a1a2e;
            color: white;
            overflow: hidden;
        }
        
        /* Menu Screen */
        #menu {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            z-index: 10;
        }
        
        .menu-left {
            width: 40%;
            padding: 40px;
            background: rgba(0,0,0,0.3);
            overflow-y: auto;
        }
        
        .menu-left h1 {
            color: #a8d8ea;
            font-size: 2.5rem;
            margin-bottom: 30px;
        }
        
        .scenario {
            background: rgba(168,216,234,0.1);
            border: 1px solid rgba(168,216,234,0.3);
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .scenario:hover, .scenario.selected {
            background: rgba(168,216,234,0.2);
            border-color: #a8d8ea;
        }
        
        .scenario h3 { color: #a8d8ea; margin-bottom: 5px; }
        .scenario p { color: #888; font-size: 14px; }
        
        .menu-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .settings-box {
            background: rgba(0,0,0,0.3);
            padding: 30px;
            border-radius: 12px;
            margin-bottom: 30px;
            width: 100%;
            max-width: 400px;
        }
        
        .settings-box label {
            display: block;
            color: #a8d8ea;
            margin-bottom: 15px;
            font-size: 18px;
        }
        
        .btn-group {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .btn-group button {
            padding: 10px 18px;
            background: rgba(168,216,234,0.1);
            border: 1px solid rgba(168,216,234,0.3);
            color: white;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-group button:hover, .btn-group button.selected {
            background: #a8d8ea;
            color: #1a1a2e;
        }
        
        .play-btn {
            padding: 18px 60px;
            font-size: 24px;
            background: #a8d8ea;
            border: none;
            color: #1a1a2e;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
           0.3s transition: all ;
        }
        
        .play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(168,216,234,0.5);
        }
        
        /* Game Screen */
        #game {
            display: none;
            width: 100vw;
            height: 100vh;
            cursor: none;
        }
        
        canvas {
            display: block;
        }
        
        .hud {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 30px;
            z-index: 100;
        }
        
        .hud-item {
            background: rgba(0,0,0,0.7);
            padding: 15px 30px;
            border-radius: 8px;
            font-size: 22px;
            border: 1px solid #a8d8ea;
        }
        
        .hud-item span { color: #a8d8ea; }
        
        /* Crosshair */
        .crosshair {
            position: fixed;
            width: 24px;
            height: 24px;
            pointer-events: none;
            z-index: 1000;
            transform: translate(-50%, -50%);
            display: none;
        }
        
        .crosshair::before, .crosshair::after {
            content: '';
            position: absolute;
            background: #a8d8ea;
        }
        
        .crosshair::before {
            width: 2px; height: 100%; left: 50%; transform: translateX(-50%);
        }
        
        .crosshair::after {
            width: 100%; height: 2px; top: 50%; transform: translateY(-50%);
        }
        
        /* Game Over */
        #gameOver {
            display: none;
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        #gameOver h2 {
            font-size: 48px;
            color: #a8d8ea;
            margin-bottom: 20px;
        }
        
        #gameOver .final-score {
            font-size: 72px;
            font-weight: bold;
            color: white;
        }
        
        #gameOver .stats {
            color: #888;
            margin: 20px 0 30px;
            font-size: 20px;
        }
        
        #gameOver button {
            padding: 15px 40px;
            font-size: 20px;
            background: #a8d8ea;
            border: none;
            color: #1a1a2e;
            border-radius: 8px;
            cursor: pointer;
            margin: 0 10px;
        }
    </style>
</head>
<body>
    <!-- Menu -->
    <div id="menu">
        <div class="menu-left">
            <h1>Aim Trainer</h1>
            <div id="scenarios"></div>
        </div>
        <div class="menu-right">
            <div class="settings-box">
                <label>Time Limit</label>
                <div class="btn-group" id="timeButtons">
                    <button data-time="15">15s</button>
                    <button data-time="30" class="selected">30s</button>
                    <button data-time="45">45s</button>
                    <button data-time="60">60s</button>
                </div>
            </div>
            <div class="settings-box">
                <label>Difficulty</label>
                <div class="btn-group" id="diffButtons">
                    <button data-diff="0">Easy</button>
                    <button data-diff="1" class="selected">Normal</button>
                    <button data-diff="2">Hard</button>
                    <button data-diff="3">Insane</button>
                </div>
            </div>
            <button class="play-btn" onclick="startGame()">PLAY</button>
        </div>
    </div>
    
    <!-- Game -->
    <div id="game">
        <div class="hud">
            <div class="hud-item">Score: <span id="scoreDisplay">0</span></div>
            <div class="hud-item">Time: <span id="timeDisplay">30</span></div>
            <div class="hud-item">Hits: <span id="hitsDisplay">0</span></div>
        </div>
    </div>
    
    <!-- Crosshair -->
    <div class="crosshair" id="crosshair"></div>
    
    <!-- Game Over -->
    <div id="gameOver">
        <h2>Game Over!</h2>
        <div class="final-score" id="finalScore">0</div>
        <div class="stats">Hits: <span id="finalHits">0</span> | Accuracy: <span id="finalAcc">0%</span></div>
        <button onclick="restartGame()">Play Again</button>
        <button onclick="showMenu()">Menu</button>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        // Config
        const scenarios = [
            { id: 'static', name: 'Static', desc: 'Click targets as fast as possible' },
            { id: 'tracking', name: 'Tracking', desc: 'Follow the moving target', moving: true },
            { id: 'reflex', name: 'Reflex', desc: 'Click targets quickly before they vanish', reflex: true },
            { id: 'chaos', name: 'Chaos', desc: 'Multiple targets at once', multi: 3 },
            { id: 'shrink', name: 'Shrink', desc: 'Targets get smaller over time', shrink: true },
            { id: 'bounce', name: 'Bounce', desc: 'Bouncing targets', moving: true },
            { id: 'precision', name: 'Precision', desc: 'Small targets, more points', small: true }
        ];
        
        const difficulties = [
            { speed: 0.5, size: 1.5 },
            { speed: 1.0, size: 1.0 },
            { speed: 1.8, size: 0.75 },
            { speed: 2.5, size: 0.55 }
        ];
        
        // State
        let selectedScenario = 'static';
        let selectedTime = 30;
        let selectedDiff = 1;
        
        // Three.js
        let scene, camera, renderer;
        let targets = [];
        let score = 0, hits = 0, clicks = 0, timeLeft = 0;
        let gameRunning = false;
        let gameTimer;
        let mouse = new THREE.Vector2();
        let raycaster = new THREE.Raycaster();
        
        // Init
        function init() {
            // Populate scenarios
            const container = document.getElementById('scenarios');
            scenarios.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = 'scenario' + (i === 0 ? ' selected' : '');
                div.innerHTML = '<h3>' + s.name + '</h3><p>' + s.desc + '</p>';
                div.onclick = () => selectScenario(i);
                container.appendChild(div);
            });
            
            // Time buttons
            document.querySelectorAll('#timeButtons button').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#timeButtons button').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedTime = parseInt(btn.dataset.time);
                };
            });
            
            // Diff buttons
            document.querySelectorAll('#diffButtons button').forEach(btn => {
                btn.onclick = () => {
                    document.querySelectorAll('#diffButtons button').forEach(b => b.classList.remove('selected'));
                    btn.classList.add('selected');
                    selectedDiff = parseInt(btn.dataset.diff);
                };
            });
            
            // Three.js setup
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x1a1a2e);
            
            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 15;
            
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.getElementById('game').appendChild(renderer.domElement);
            
            // Lights
            scene.add(new THREE.AmbientLight(0xffffff, 0.7));
            const light = new THREE.DirectionalLight(0xffffff, 0.5);
            light.position.set(5, 5, 10);
            scene.add(light);
            
            // Grid
            const grid = new THREE.GridHelper(50, 25, 0x333355, 0x222244);
            grid.position.y = -8;
            scene.add(grid);
            
            // Events
            window.addEventListener('resize', onResize);
            document.addEventListener('mousemove', onMouseMove);
            document.addEventListener('click', onClick);
            
            animate();
        }
        
        function selectScenario(index) {
            selectedScenario = scenarios[index].id;
            document.querySelectorAll('.scenario').forEach((el, i) => {
                el.classList.toggle('selected', i === index);
            });
        }
        
        function startGame() {
            const scen = scenarios.find(s => s.id === selectedScenario);
            const diff = difficulties[selectedDiff];
            
            // Reset
            score = 0; hits = 0; clicks = 0;
            timeLeft = selectedTime;
            gameRunning = true;
            
            // Clear old targets
            targets.forEach(t => scene.remove(t));
            targets = [];
            
            // Spawn initial
            spawnTargets(scen, diff);
            
            // Show game
            document.getElementById('menu').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            
            updateHUD();
            
            // Timer
            clearInterval(gameTimer);
            gameTimer = setInterval(() => {
                timeLeft--;
                updateHUD();
                if (timeLeft <= 0) endGame();
            }, 1000);
        }
        
        function spawnTargets(scen, diff) {
            const count = scen.multi || 1;
            for (let i = 0; i < count; i++) {
                const radius = 0.8 * diff.size * (scen.small ? 0.4 : 1);
                
                const geo = new THREE.CircleGeometry(radius, 32);
                const mat = new THREE.MeshPhongMaterial({ color: 0xff4444 });
                const target = new THREE.Mesh(geo, mat);
                
                // Random position in view
                target.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 12,
                    -10
                );
                
                target.userData = {
                    born: Date.now(),
                    velocity: scen.moving ? new THREE.Vector3(
                        (Math.random() - 0.5) * 0.15 * diff.speed,
                        (Math.random() - 0.5) * 0.15 * diff.speed,
                        0
                    ) : null,
                    shrink: scen.shrink,
                    reflex: scen.reflex
                };
                
                scene.add(target);
                targets.push(target);
            }
        }
        
        function updateHUD() {
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('timeDisplay').textContent = timeLeft;
            document.getElementById('hitsDisplay').textContent = hits;
        }
        
        function endGame() {
            gameRunning = false;
            clearInterval(gameTimer);
            
            const acc = clicks > 0 ? Math.round(hits / clicks * 100) : 0;
            
            document.getElementById('finalScore').textContent = score;
            document.getElementById('finalHits').textContent = hits;
            document.getElementById('finalAcc').textContent = acc + '%';
            document.getElementById('gameOver').style.display = 'flex';
        }
        
        function restartGame() {
            document.getElementById('gameOver').style.display = 'none';
            startGame();
        }
        
        function showMenu() {
            document.getElementById('gameOver').style.display = 'none';
            document.getElementById('game').style.display = 'none';
            document.getElementById('crosshair').style.display = 'none';
            document.getElementById('menu').style.display = 'flex';
            
            targets.forEach(t => scene.remove(t));
            targets = [];
            gameRunning = false;
        }
        
        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
            
            if (gameRunning) {
                document.getElementById('crosshair').style.left = e.clientX + 'px';
                document.getElementById('crosshair').style.top = e.clientY + 'px';
            }
        }
        
        function onClick(e) {
            if (!gameRunning) return;
            
            clicks++;
            
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObjects(targets);
            
            if (intersects.length > 0) {
                hits++;
                const target = intersects[0].object;
                
                // Points
                let pts = 100;
                if (scenarios.find(s => s.id === selectedScenario).small) pts = 200;
                score += pts;
                
                // Remove
                scene.remove(target);
                targets = targets.filter(t => t !== target);
                
                // Respawn
                const scen = scenarios.find(s => s.id === selectedScenario);
                const diff = difficulties[selectedDiff];
                if (scen.id !== 'tracking' && scen.id !== 'bounce') {
                    setTimeout(() => spawnTargets(scen, diff), 150);
                }
            }
            
            updateHUD();
        }
        
        function onResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }
        
        function animate() {
            requestAnimationFrame(animate);
            
            if (gameRunning) {
                const scen = scenarios.find(s => s.id === selectedScenario);
                const diff = difficulties[selectedDiff];
                
                targets.forEach((t, i) => {
                    // Move
                    if (t.userData.velocity) {
                        t.position.add(t.userData.velocity);
                        if (Math.abs(t.position.x) > 10) t.userData.velocity.x *= -1;
                        if (Math.abs(t.position.y) > 6) t.userData.velocity.y *= -1;
                    }
                    
                    // Shrink
                    if (t.userData.shrink && t.scale.x > 0.3) {
                        t.scale.multiplyScalar(0.995);
                    }
                    
                    // Reflex timeout
                    if (t.userData.reflex && Date.now() - t.userData.born > 1500) {
                        scene.remove(t);
                        targets.splice(i, 1);
                        setTimeout(() => spawnTargets(scen, diff), 100);
                    }
                });
            }
            
            renderer.render(scene, camera);
        }
        
        init();
    </script>
</body>
</html>
