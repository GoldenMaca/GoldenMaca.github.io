<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modals Demo - Aim Trainer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0f;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            padding: 20px;
        }
        
        h1 {
            font-size: 48px;
            color: #00ff88;
            text-shadow: 0 0 30px #00ff88;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #666;
            margin-bottom: 40px;
            font-size: 16px;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            max-width: 500px;
            width: 100%;
        }
        
        .test-btn {
            padding: 25px 30px;
            font-size: 16px;
            font-weight: 600;
            border: none;
            border-radius: 14px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
        }
        
        .test-btn:hover {
            transform: translateY(-4px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.4);
        }
        
        .btn-settings {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #0a0a0f;
        }
        
        .btn-clans {
            background: linear-gradient(135deg, #ffaa00, #ff8800);
            color: #0a0a0f;
        }
        
        .btn-rooms {
            background: linear-gradient(135deg, #64ffda, #4fd1c5);
            color: #0a0a0f;
        }
        
        .btn-matchmaking {
            background: linear-gradient(135deg, #ff6b6b, #ee5a5a);
            color: white;
        }
        
        /* ================= CSS VARIABLES ================= */
        :root {
            --modal-bg-primary: rgba(26, 26, 46, 0.95);
            --modal-bg-secondary: rgba(15, 15, 26, 0.9);
            --modal-border: rgba(0, 255, 136, 0.3);
            --modal-border-hover: rgba(0, 255, 136, 0.6);
            --modal-accent: #00ff88;
            --modal-accent-secondary: #ffaa00;
            --modal-text: #ffffff;
            --modal-text-muted: #888888;
            --modal-glass: rgba(255, 255, 255, 0.05);
            --modal-glass-hover: rgba(255, 255, 255, 0.1);
            --modal-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            --modal-blur: blur(20px);
            --transition-fast: 0.15s ease;
            --transition-normal: 0.3s ease;
            --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* ================= MODAL OVERLAY ================= */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            backdrop-filter: var(--modal-blur);
            -webkit-backdrop-filter: var(--modal-blur);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2500;
            padding: 20px;
            opacity: 0;
            transition: opacity var(--transition-normal);
        }

        .modal-overlay.active {
            display: flex;
            opacity: 1;
        }

        /* ================= MODAL CONTAINER ================= */
        .modal-container {
            background: linear-gradient(165deg, var(--modal-bg-primary) 0%, var(--modal-bg-secondary) 50%, rgba(22, 33, 62, 0.95) 100%);
            border: 2px solid var(--modal-border);
            border-radius: 24px;
            padding: 40px;
            width: 100%;
            max-width: 520px;
            max-height: 85vh;
            overflow-y: auto;
            overflow-x: hidden;
            box-shadow: var(--modal-shadow), 0 0 40px rgba(0, 255, 136, 0.1);
            position: relative;
            transform: translateY(20px) scale(0.95);
            transition: transform var(--transition-smooth), border-color var(--transition-normal);
        }

        .modal-overlay.active .modal-container {
            transform: translateY(0) scale(1);
        }

        .modal-container:hover {
            border-color: var(--modal-border-hover);
        }

        .modal-container::-webkit-scrollbar {
            width: 6px;
        }

        .modal-container::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 3px;
        }

        .modal-container::-webkit-scrollbar-thumb {
            background: var(--modal-accent);
            border-radius: 3px;
        }

        /* ================= MODAL HEADER ================= */
        .modal-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .modal-header h2 {
            color: var(--modal-text);
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .modal-subtitle {
            color: var(--modal-text-muted);
            font-size: 14px;
            margin-top: 8px;
        }

        /* ================= CLOSE BUTTON ================= */
        .modal-close {
            position: absolute;
            top: 16px;
            right: 16px;
            background: var(--modal-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: var(--modal-text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all var(--transition-fast);
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(255, 68, 68, 0.2);
            border-color: rgba(255, 68, 68, 0.5);
            color: #ff4444;
            transform: rotate(90deg);
        }

        /* ================= SETTINGS MODAL ================= */
        .settings-box {
            border-color: rgba(0, 255, 136, 0.3);
        }

        .settings-box:hover {
            border-color: rgba(0, 255, 136, 0.6);
        }

        .settings-box .modal-header h2 {
            color: var(--modal-accent);
        }

        .settings-section {
            margin-bottom: 32px;
            animation: fadeInUp 0.4s ease backwards;
        }

        .settings-section:nth-child(2) { animation-delay: 0.1s; }
        .settings-section:nth-child(3) { animation-delay: 0.2s; }
        .settings-section:nth-child(4) { animation-delay: 0.3s; }

        .section-title {
            color: var(--modal-text-muted);
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .section-title::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, rgba(255,255,255,0.1), transparent);
        }

        /* Theme Grid */
        .theme-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
        }

        .theme-option {
            background: var(--modal-glass);
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 16px;
            cursor: pointer;
            text-align: center;
            transition: all var(--transition-normal);
            position: relative;
            overflow: hidden;
        }

        .theme-option::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.05) 100%);
            opacity: 0;
            transition: opacity var(--transition-fast);
        }

        .theme-option:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
        }

        .theme-option:hover::before {
            opacity: 1;
        }

        .theme-option.active {
            border-color: var(--modal-accent);
            box-shadow: 0 0 25px rgba(0, 255, 136, 0.25), inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .theme-option.active::after {
            content: '✓';
            position: absolute;
            top: 8px;
            right: 8px;
            color: var(--modal-accent);
            font-size: 14px;
            font-weight: bold;
        }

        .theme-preview {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-bottom: 10px;
        }

        .theme-preview-color {
            width: 24px;
            height: 24px;
            border-radius: 6px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
        }

        .theme-name {
            color: var(--modal-text);
            font-size: 13px;
            font-weight: 500;
        }

        /* Sensitivity Converter */
        .sens-converter {
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 24px;
        }

        .sens-converter h4 {
            color: var(--modal-text);
            font-size: 16px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .sens-row {
            display: flex;
            gap: 12px;
            margin-bottom: 12px;
        }

        .sens-row select,
        .sens-row input {
            flex: 1;
            padding: 14px 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            color: var(--modal-text);
            font-size: 14px;
            transition: all var(--transition-fast);
            outline: none;
        }

        .sens-row select:focus,
        .sens-row input:focus {
            border-color: var(--modal-accent);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.15);
        }

        .sens-row select option {
            background: #1a1a2e;
            color: white;
        }

        .sens-result {
            text-align: center;
            color: var(--modal-accent);
            font-size: 18px;
            font-weight: 700;
            padding: 16px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            margin-top: 16px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all var(--transition-fast);
        }

        .sens-result:hover {
            background: rgba(0, 255, 136, 0.15);
        }

        /* Buttons */
        .button-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 14px 24px;
            border: none;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all var(--transition-normal);
            flex: 1;
            min-width: 140px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--modal-accent), #00cc6a);
            color: #0a0a0f;
            box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
        }

        .btn-danger {
            background: linear-gradient(135deg, #ff4444, #cc3333);
            color: white;
            box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
        }

        .btn-danger:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(255, 68, 68, 0.4);
        }

        /* ================= CLANS MODAL ================= */
        .clans-box {
            border-color: rgba(255, 170, 0, 0.3);
        }

        .clans-box:hover {
            border-color: rgba(255, 170, 0, 0.6);
        }

        .clans-box .modal-header h2 {
            color: var(--modal-accent-secondary);
        }

        .clan-content {
            animation: fadeInUp 0.4s ease;
        }

        .clan-info {
            text-align: center;
            padding: 20px 0;
        }

        .clan-info h3 {
            color: var(--modal-accent-secondary);
            font-size: 28px;
            margin-bottom: 20px;
        }

        .clan-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 16px;
            margin-bottom: 24px;
        }

        .clan-stat {
            background: var(--modal-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            padding: 20px;
            transition: all var(--transition-fast);
        }

        .clan-stat:hover {
            background: var(--modal-glass-hover);
            transform: translateY(-2px);
        }

        .clan-stat-value {
            font-size: 24px;
            font-weight: 700;
            color: var(--modal-text);
        }

        .clan-stat-label {
            font-size: 12px;
            color: var(--modal-text-muted);
            margin-top: 4px;
        }

        .clan-stat.pot .clan-stat-value {
            color: var(--modal-accent);
        }

        .clan-invite-code {
            background: rgba(0, 0, 0, 0.4);
            border: 2px dashed rgba(0, 255, 136, 0.3);
            border-radius: 16px;
            padding: 24px;
            margin: 24px 0;
            text-align: center;
        }

        .clan-invite-code-label {
            color: var(--modal-text-muted);
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 8px;
        }

        .clan-invite-code strong {
            color: var(--modal-accent);
            font-size: 28px;
            letter-spacing: 4px;
            font-weight: 700;
        }

        .clan-join {
            text-align: center;
        }

        .clan-join h3 {
            color: var(--modal-text);
            font-size: 18px;
            margin-bottom: 16px;
        }

        .clan-join input {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--modal-text);
            font-size: 16px;
            margin-bottom: 16px;
            transition: all var(--transition-fast);
            outline: none;
            text-align: center;
        }

        .clan-join input:focus {
            border-color: var(--modal-accent-secondary);
            box-shadow: 0 0 20px rgba(255, 170, 0, 0.15);
        }

        .clan-join input::placeholder {
            color: var(--modal-text-muted);
        }

        .clan-divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 28px 0;
            color: var(--modal-text-muted);
            font-size: 12px;
        }

        .clan-divider::before,
        .clan-divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }

        /* ================= PRIVATE ROOMS MODAL ================= */
        .private-rooms-box {
            border-color: rgba(100, 255, 218, 0.3);
        }

        .private-rooms-box:hover {
            border-color: rgba(100, 255, 218, 0.6);
        }

        .private-rooms-box .modal-header h2 {
            color: #64ffda;
        }

        .private-rooms-content {
            animation: fadeInUp 0.4s ease;
        }

        .room-code-display {
            font-size: 42px;
            font-weight: 800;
            color: var(--modal-accent);
            letter-spacing: 6px;
            background: rgba(0, 0, 0, 0.4);
            border: 2px solid var(--modal-accent);
            border-radius: 16px;
            padding: 28px;
            margin: 24px 0;
            text-align: center;
            font-family: 'Courier New', monospace;
            text-shadow: 0 0 20px rgba(0, 255, 136, 0.5);
            animation: pulse 2s ease-in-out infinite;
        }

        .room-info {
            color: var(--modal-text-muted);
            font-size: 14px;
            text-align: center;
            margin-bottom: 16px;
        }

        .create-room h3 {
            color: var(--modal-text);
            font-size: 18px;
            margin-bottom: 20px;
            text-align: center;
        }

        .create-room select {
            width: 100%;
            padding: 16px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 12px;
            color: var(--modal-text);
            font-size: 14px;
            margin-bottom: 12px;
            transition: all var(--transition-fast);
            outline: none;
            cursor: pointer;
        }

        .create-room select:focus {
            border-color: #64ffda;
            box-shadow: 0 0 20px rgba(100, 255, 218, 0.15);
        }

        .create-room select option {
            background: #1a1a2e;
        }

        /* ================= MATCHMAKING MODAL ================= */
        .matchmaking-box {
            border-color: rgba(255, 107, 107, 0.3);
        }

        .matchmaking-box:hover {
            border-color: rgba(255, 107, 107, 0.6);
        }

        .matchmaking-box .modal-header h2 {
            color: #ff6b6b;
        }

        .matchmaking-content {
            animation: fadeInUp 0.4s ease;
        }

        .queue-info {
            color: var(--modal-accent);
            font-size: 16px;
            text-align: center;
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 12px;
            border: 1px solid rgba(0, 255, 136, 0.2);
        }

        .queue-game {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--modal-glass);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 14px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all var(--transition-fast);
        }

        .queue-game:hover {
            background: var(--modal-glass-hover);
            border-color: rgba(255, 255, 255, 0.2);
            transform: translateX(4px);
        }

        .queue-game-info {
            display: flex;
            align-items: center;
            gap: 14px;
        }

        .queue-game-icon {
            font-size: 24px;
        }

        .queue-game-name {
            color: var(--modal-text);
            font-weight: 600;
            font-size: 15px;
        }

        .queue-count {
            color: var(--modal-text-muted);
            font-size: 13px;
            padding: 6px 12px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 20px;
        }

        .queue-game button {
            padding: 10px 20px;
            background: linear-gradient(135deg, var(--modal-accent), #00cc6a);
            border: none;
            border-radius: 10px;
            color: #0a0a0f;
            font-weight: 700;
            font-size: 13px;
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .queue-game button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }

        /* ================= ANIMATIONS ================= */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes pulse {
            0%, 100% {
                box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
            }
            50% {
                box-shadow: 0 0 40px rgba(0, 255, 136, 0.5);
            }
        }

        /* ================= MOBILE RESPONSIVE ================= */
        @media (max-width: 600px) {
            .modal-container {
                padding: 24px;
                max-height: 90vh;
                border-radius: 20px;
            }

            .modal-header h2 {
                font-size: 24px;
            }

            .theme-grid {
                grid-template-columns: 1fr;
            }

            .button-group {
                flex-direction: column;
            }

            .btn {
                width: 100%;
            }

            .clan-stats {
                grid-template-columns: 1fr;
            }

            .queue-game {
                flex-direction: column;
                gap: 12px;
                text-align: center;
            }

            .queue-game-info {
                flex-direction: column;
            }

            .room-code-display {
                font-size: 28px;
                letter-spacing: 4px;
                padding: 20px;
            }

            .sens-row {
                flex-direction: column;
            }

            .modal-close {
                top: 12px;
                right: 12px;
                width: 36px;
                height: 36px;
            }
        }
    </style>
</head>
<body>
    <h1>🎮 Aim Trainer</h1>
    <p class="subtitle">Click a button to test each modal</p>
    
    <div class="button-grid">
        <button class="test-btn btn-settings" onclick="showSettingsModal()">
            ⚙️ Settings
        </button>
        <button class="test-btn btn-clans" onclick="showClansModal()">
            ⚔️ Clans
        </button>
        <button class="test-btn btn-rooms" onclick="showPrivateRoomsModal()">
            🔒 Private Rooms
        </button>
        <button class="test-btn btn-matchmaking" onclick="showMatchmakingModal()">
            🎯 1v1 Matchmaking
        </button>
    </div>

    <!-- ================= SETTINGS MODAL ================= -->
    <div class="modal-overlay settings-modal" id="settings-modal" role="dialog" aria-labelledby="settings-title" aria-modal="true">
        <div class="modal-container settings-box">
            <button class="modal-close" onclick="closeSettingsModal()" aria-label="Close settings">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18"></line>
                    <line x1="6" y1="6" x2="18" y2="18"></line>
                </svg>
            </button>
            
            <div class="modal-header">
                <h2 id="settings-title">⚙️ Settings</h2>
            </div>
            
            <div class="settings-section">
                <h3 class="section-title">🎨 Theme</h3>
                <div class="theme-grid" id="theme-options" role="radiogroup" aria-label="Select theme">
                    <!-- Themes rendered by JS -->
                </div>
            </div>
            
            <div class="settings-section">
                <h3 class="section-title">🎯 Sensitivity Converter</h3>
                <div id="sens-converter">
                    <!-- Rendered by JS -->
                </div>
            </div>
            
            <div class="settings-section">
                <h3 class="section-title">👤 Account</h3>
                <div class="button-group">
                    <button class="btn btn-primary" onclick="showProfileCard()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                            <circle cx="12" cy="7" r="4"></circle>
                        </svg>
                        View Profile
                    </button>
                    <button class="btn btn-danger" onclick="handleLogout()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                        Sign Out
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ================= CLANS MODAL ================= -->
