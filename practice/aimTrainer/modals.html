<!-- ================= SETTINGS MODAL ================= -->
<div class="modal-overlay settings-modal" id="settings-modal" role="dialog" aria-labelledby="settings-title" aria-modal="true">
    <div class="modal-container settings-box">
        <button class="modal-close" onclick="closeSettingsModal()" aria-label="Close settings">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        
        <div class="modal-header">
            <h2 id="settings-title">⚙️ Settings</h2>
        </div>
        
        <!-- Theme Selection -->
        <div class="settings-section">
            <h3 class="section-title">🎨 Theme</h3>
            <div class="theme-grid" id="theme-options" role="radiogroup" aria-label="Select theme">
            </div>
        </div>
        
        <!-- Sensitivity Converter -->
        <div class="settings-section">
            <h3 class="section-title">🎯 Sensitivity Converter</h3>
            <div id="sens-converter">
            </div>
        </div>
        
        <!-- Account Settings -->
        <div class="settings-section">
            <h3 class="section-title">👤 Account</h3>
            <div class="button-group">
                <button class="btn btn-primary" onclick="showProfileCard()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                        <circle cx="12" cy="7" r="4"></circle>
                    </svg>
                    View Profile
                </button>
                <button class="btn btn-danger" onclick="handleLogout()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                        <polyline points="16 17 21 12 16 7"></polyline>
                        <line x1="21" y1="12" x2="9" y2="12"></line>
                    </svg>
                    Sign Out
                </button>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay clans-modal" id="clans-modal" role="dialog" aria-labelledby="clans-title" aria-modal="true">

        <button class="modal-close" onclick="closeClansModal()" aria-label="Close clans">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <div class="modal-header">
            <h2 id="clans-title">⚔️ Clans</h2>

</div>

<!-- ================= PRIVATE ROOMS MODAL ================= -->
<div class="modal-overlay private-rooms-modal" id="private-rooms-modal" role="dialog" aria-labelledby="private-rooms-title" aria-modal="true">
    <div class="modal-container private-rooms-box">
        <button class="modal-close" onclick="closePrivateRoomsModal()" aria-label="Close private rooms">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <div class="modal-header">
            <h2 id="private-rooms-title">🔒 Private Rooms</h2>

<!-- ================= FRIEND CHALLENGE MODAL ================= -->
<div class="modal-overlay friend-challenge-modal" id="friend-challenge-modal" role="dialog" aria-labelledby="friend-challenge-title" aria-modal="true">
    <div class="modal-container friend-challenge-box">
        <button class="modal-close" onclick="closeFriendChallengeModal()" aria-label="Close friend challenge">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

        <div class="modal-header">

</div>

<!-- ================= ACTIVE MATCH MODAL ================= -->
<div class="modal-overlay active-match-modal" id="active-match-modal" role="dialog" aria-labelledby="active-match-title" aria-modal="true">
    <div class="modal-container active-match-box">
        <div class="modal-header">
            <h2 id="active-match-title">⚔️ Live Match</h2>
        </div>
        
        <div id="active-match-content" class="active-match-content">

    </div>
</div>

<!-- ================= MATCHMAKING MODAL ================= -->
<div class="modal-overlay matchmaking-modal" id="matchmaking-modal" role="dialog" aria-labelledby="matchmaking-title" aria-modal="true">
    <div class="modal-container matchmaking-box">
        <button class="modal-close" onclick="closeMatchmakingModal()" aria-label="Close matchmaking">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <line x1="18" y1="6" x2="6" y2="18"></line>
                <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
        </button>
        
        <div class="modal-header">
            <h2 id="matchmaking-title">🎯 Quick Match</h2>
            <p class="modal-subtitle">Find a random opponent or challenge friends!</p>
        </div>
        
        <!-- Quick Actions -->
        <div class="quick-actions">
            <button class="action-card" onclick="showFriendChallengeModal()">
                <span class="action-icon">👥</span>
                <span class="action-title">Challenge Friend</span>
                <span class="action-desc">Play against someone you know</span>
            </button>
            <button class="action-card" onclick="showPrivateRoomsModal()">
                <span class="action-icon">🔒</span>
                <span class="action-title">Private Room</span>
                <span class="action-desc">Create a room with a code</span>
            </button>
        </div>
        
        <div class="section-divider">
            <span>Or find a random opponent</span>
        </div>
        
        <div id="matchmaking-content" class="matchmaking-content">
        </div>
    </div>
</div>

<!-- ========================================= -->
<!-- STYLES -->
<!-- ========================================= -->
<style>
:root {
    --modal-bg-primary: rgba(26, 26, 46, 0.95);
    --modal-bg-secondary: rgba(15, 15, 26, 0.9);
    --modal-border: rgba(0, 255, 136, 0.3);
    --modal-border-hover: rgba(0, 255, 136, 0.6);
    --modal-accent: #00ff88;
    --modal-accent-secondary: #ffaa00;
    --modal-text: #ffffff;
    --modal-text-muted: #888888;
    --modal-glass: rgba(255, 255, 255, 0.05);
    --modal-glass-hover: rgba(255, 255, 255, 0.1);
    --modal-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    --modal-blur: blur(20px);
    --transition-fast: 0.15s ease;
    --transition-normal: 0.3s ease;
    --transition-smooth: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0, 0, 0, 0.85);
    backdrop-filter: var(--modal-blur);
    display: none;
    align-items: center;
    justify-content: center;
    z-index: 2500;
    padding: 20px;
    opacity: 0;
    transition: opacity var(--transition-normal);
}

.modal-overlay.active {
    display: flex;
    opacity: 1;
}

.modal-container {
    background: linear-gradient(165deg, var(--modal-bg-primary) 0%, var(--modal-bg-secondary) 50%, rgba(22, 33, 62, 0.95) 100%);
    border: 2px solid var(--modal-border);
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 520px;
    max-height: 85vh;
    overflow-y: auto;
    box-shadow: var(--modal-shadow), 0 0 40px rgba(0, 255, 136, 0.1);
    position: relative;
    transform: translateY(20px) scale(0.95);
    transition: transform var(--transition-smooth), border-color var(--transition-normal);
}

.modal-overlay.active .modal-container {
    transform: translateY(0) scale(1);
}

.modal-container:hover {
    border-color: var(--modal-border-hover);
}

.modal-header {
    text-align: center;
    margin-bottom: 30px;
}

.modal-header h2 {
    color: var(--modal-text);
    font-size: 32px;
    font-weight: 700;
    margin-bottom: 8px;
}

.modal-subtitle {
    color: var(--modal-text-muted);
    font-size: 14px;
    margin-top: 8px;
}

.modal-close {
    position: absolute;
    top: 16px;
    right: 16px;
    background: var(--modal-glass);
    border: 1px solid rgba(255, 255, 255, 0.1);
    color: var(--modal-text-muted);
    width: 40px;
    height: 40px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all var(--transition-fast);
    z-index: 10;
}

.modal-close:hover {
    background: rgba(255, 68, 68, 0.2);
    color: #ff4444;
    transform: rotate(90deg);
}

.section-title {
    color: var(--modal-text-muted);
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
}

/* Settings Modal */
.settings-box { border-color: rgba(0, 255, 136, 0.3); }
.settings-box:hover { border-color: rgba(0, 255, 136, 0.6); }
.settings-box .modal-header h2 { color: var(--modal-accent); }

.settings-section {
    margin-bottom: 32px;
    animation: fadeInUp 0.4s ease backwards;
}

.theme-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 12px;
}

.theme-option {
    background: var(--modal-glass);
    border: 2px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 16px;
    cursor: pointer;
    text-align: center;
    transition: all var(--transition-normal);
    position: relative;
}

.theme-option:hover {
    border-color: rgba(255, 255, 255, 0.3);
    transform: translateY(-2px);
}

.theme-option.active {
    border-color: var(--modal-accent);
    box-shadow: 0 0 25px rgba(0, 255, 136, 0.25);
}

.theme-option.active::after {
    content: '✓';
    position: absolute;
    top: 8px;
    right: 8px;
    color: var(--modal-accent);
    font-size: 14px;
    font-weight: bold;
}

.theme-name {
    color: var(--modal-text);
    font-size: 13px;
    font-weight: 500;
    display: block;
    margin-top: 8px;
}

.sens-converter {
    background: rgba(0, 0, 0, 0.3);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
}

.sens-converter h4 {
    color: var(--modal-text);
    font-size: 16px;
    margin-bottom: 20px;
}

.sens-row {
    display: flex;
    gap: 12px;
    margin-bottom: 12px;
}

.sens-row select,
.sens-row input {
    flex: 1;
    padding: 14px 16px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 12px;
    color: var(--modal-text);
    font-size: 14px;
    outline: none;
}

.sens-row select:focus,
.sens-row input:focus {
    border-color: var(--modal-accent);
}

.sens-result {
    text-align: center;
    color: var(--modal-accent);
    font-size: 18px;
    font-weight: 700;
    padding: 16px;
    background: rgba(0, 255, 136, 0.1);
    border-radius: 12px;
    margin-top: 16px;
}

.button-group {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
}

.btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 24px;
    border: none;
    border-radius: 12px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-normal);
    flex: 1;
    min-width: 140px;
}

.btn-primary {
    background: linear-gradient(135deg, var(--modal-accent), #00cc6a);
    color: #0a0a0f;
    box-shadow: 0 4px 15px rgba(0, 255, 136, 0.3);
}

.btn-primary:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(0, 255, 136, 0.4);
}

.btn-danger {
    background: linear-gradient(135deg, #ff4444, #cc3333);
    color: white;
    box-shadow: 0 4px 15px rgba(255, 68, 68, 0.3);
}

.btn-danger:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 25px rgba(255, 68, 68, 0.4);
}

/* Clans Modal */
.clans-box { border-color: rgba(255, 170, 0, 0.3); }
.clans-box:hover { border-color: rgba(255, 170, 0, 0.6); }
.clans-box .modal-header h2 { color: var(--modal-accent-secondary); }

.clan-content { animation: fadeInUp 0.4s ease; }

.clan-info { text-align: center; padding: 20px 0; }
.clan-info h3 { color: var(--modal-accent-secondary); font-size: 28px; margin-bottom: 20px; }

.clan-stats {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px;
    margin-bottom: 24px;
}

.clan-stat {
    background: var(--modal-glass);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 16px;
    padding: 20px;
    text-align: center;
}

.clan-stat-value { font-size: 24px; font-weight: 700; color: var(--modal-text); }
.clan-stat-label { font-size: 12px; color: var(--modal-text-muted); margin-top: 4px; }
.clan-stat.pot .clan-stat-value { color: var(--modal-accent); }

.clan-invite-code {
    background: rgba(0, 0, 0, 0.4);
    border: 2px dashed rgba(0, 255, 136, 0.3);
    border-radius: 16px;
    padding: 24px;
    margin: 24px 0;
    text-align: center;
}

.clan-invite-code-label {
    color: var(--modal-text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 8px;
}

.clan-invite-code strong {
    color: var(--modal-accent);
    font-size: 28px;
    letter-spacing: 4px;
    font-weight: 700;
}

.clan-join { text-align: center; }
.clan-join h3 { color: var(--modal-text); font-size: 18px; margin-bottom: 16px; }

.clan-join input {
    width: 100%;
    padding: 16px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    color: var(--modal-text);
    font-size: 16px;
    margin-bottom: 16px;
    outline: none;
    text-align: center;
}

.clan-join input:focus {
    border-color: var(--modal-accent-secondary);
}

/* Private Rooms Modal */
.private-rooms-box { border-color: rgba(100, 255, 218, 0.3); }
.private-rooms-box:hover { border-color: rgba(100, 255, 218, 0.6); }
.private-rooms-box .modal-header h2 { color: #64ffda; }

.private-rooms-content { animation: fadeInUp 0.4s ease; }

.room-players {
    background: rgba(0, 0, 0, 0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.room-players-title {
    color: var(--modal-text-muted);
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    display: flex;
    justify-content: space-between;
}

.player-count-badge {
    background: rgba(100, 255, 218, 0.2);
    color: #64ffda;
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 12px;
}

.player-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px;
    background: var(--modal-glass);
    border-radius: 12px;
    margin-bottom: 8px;
}

.player-avatar {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: linear-gradient(135deg, #64ffda, #4fd1c5);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: #0a0a0f;
}

.player-info { flex: 1; }
.player-name { color: var(--modal-text); font-weight: 600; }
.player-status { color: var(--modal-text-muted); font-size: 12px; }
.player-status.ready { color: var(--modal-accent); }

/* Coin Bidding */
.coin-bid-section {
    background: rgba(255, 170, 0, 0.1);
    border: 1px solid rgba(255, 170, 0, 0.3);
    border-radius: 16px;
    padding: 20px;
    margin-bottom: 20px;
}

.coin-bid-title {
    color: var(--modal-accent-secondary);
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.coin-bid-input-group {
    display: flex;
    gap: 12px;
    align-items: center;
}

.coin-bid-input {
    flex: 1;
    padding: 14px 16px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid rgba(255, 170, 0, 0.3);
    border-radius: 12px;
    color: var(--modal-text);
    font-size: 18px;
    font-weight: 700;
    text-align: center;
    outline: none;
}

.coin-bid-input:focus {
    border-color: var(--modal-accent-secondary);
}

.coin-bid-info {
    color: var(--modal-text-muted);
    font-size: 12px;
    margin-top: 8px;
    text-align: center;
}

.bid-match {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 12px;
    background: rgba(0, 255, 136, 0.1);
    border-radius: 8px;
    margin-top: 12px;
    font-size: 14px;
}

.bid-match.accepted { background: rgba(0, 255, 136, 0.2); color: var(--modal-accent); }
.bid-match.pending { background: rgba(255, 170, 0, 0.1); color: var(--modal-accent-secondary); }

.room-code-display {
    font-size: 42px;
    font-weight: 800;
    color: var(--modal-accent);
    letter-spacing: 6px;
    background: rgba(0, 0, 0, 0.4);
    border: 2px solid var(--modal-accent);
    border-radius: 16px;
    padding: 28px;
    margin: 24px 0;
    text-align: center;
    font-family: 'Courier New', monospace;
    animation: pulse 2s ease-in-out infinite;
}

.room-info { color: var(--modal-text-muted); font-size: 14px; text-align: center; margin-bottom: 16px; }

.create-room h3 { color: var(--modal-text); font-size: 18px; margin-bottom: 20px; text-align: center; }

.create-room select {
    width: 100%;
    padding: 16px;
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 12px;
    color: var(--modal-text);
    font-size: 14px;
    margin-bottom: 12px;
    outline: none;
    cursor: pointer;
}

.start-match-btn {
    width: 100%;
    padding: 18px;
    background: linear-gradient(135deg, var(--modal-accent), #00cc6a);
    border: none;
    border-radius: 14px;
    color: #0a0a0f;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    transition: all var(--transition-normal);
    margin-top: 20px;
    text-transform: uppercase;
    letter-spacing: 2px;
}

.start-match-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(0, 255, 136, 0.5);
}

.start-match-btn:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
}

/* Friend Challenge Modal */
.friend-challenge-box { border-color: rgba(168, 85, 247, 0.3); }
.friend-challenge-box:hover { border-color: rgba(168, 85, 247, 0.6); }
.friend-challenge-box .modal-header h2 { color: #a855f7; }

.friend-challenge-content { animation: fadeInUp 0.4s ease; }

.friend-list {
    max-height: 300px;
    overflow-y: auto;
    margin-bottom: 20px;
}

.friend-challenge-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 16px;
    background: var(--modal-glass);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    margin-bottom: 12px;
}

.friend-challenge-item:hover {
    background: var(--modal-glass-hover);
}

.friend-info {
    display: flex;
    align-items: center;
    gap: 12px;
}

.friend-avatar {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    color: white;
    font-size: 16px;
}

.friend-name { color: var(--modal-text); font-weight: 600; font-size: 16px; }
.friend-status { color: var(--modal-text-muted); font-size: 12px; }
.friend-status.online { color: var(--modal-accent); }

.challenge-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, #a855f7, #7c3aed);
    border: none;
    border-radius: 10px;
    color: white;
    font-weight: 600;
    cursor: pointer;
}

.challenge-btn:hover {
    transform: translateY(-2px);
    box-shadow: 0 6px 20px rgba(168, 85, 247, 0.4);
}

.challenge-btn:disabled {
    background: #333;
    color: #666;
    cursor: not-allowed;
}

.no-friends {
    text-align: center;
    padding: 40px 20px;
    color: var(--modal-text-muted);
}

/* Active Match Modal */
.active-match-box { border-color: rgba(255, 68, 68, 0.3); }
.active-match-box:hover { border-color: rgba(255, 68, 68, 0.6); }

.active-match-content { animation: fadeInUp 0.4s ease; }

.match-vs { text-align: center; margin-bottom: 30px; }

.match-vs-title {
    color: var(--modal-text-muted);
