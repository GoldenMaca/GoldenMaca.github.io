<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample</title>

<script src="main.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
 <div id="map">
      
        
    </div>

    <div id="bar">
      <div id="stats">
        <div id="money">
          <h2 id="startermoney">$1000</h2>
        </div>
        <div id="year"><h2 id="starteryear">2020</h2></div>
        <div id="month"><h2 id="startermonth">January</h2></div>
        <div id="fans"><h2 id="starterfans">0 fans</h2></div>
      </div>
      <div id="inventory">
        <button onclick="showInv();" id="showInv">Inventory</button>
      <div id="inv" style="display: none;">
          <table>
            <tr>
              <th>Metals</th>
              <td id="metalNum">0</td>
            </tr>
            <tr>
              <th>Plastics</th>
              <td id="plasticNum">0</td>
            </tr>
            <tr>
              <th>Electronics</th>
              <td id="electronicNum">0</td>
            </tr>
            <tr>
              <th>Cars</th>
              <td id="carNum">0</td>
            </tr>
          </table>
        </div>
        <div class="car-buttons">
          <button id="makecar" onclick="makeCar();">Create Car</button>
          <button id="sellCar" onclick="sellCar();">Sell Car</button>
        </div>
      </div>
        </div>
      <div id="buysellmenu">
        <table id="items">
          <tr>
            <td><button id="buyMetals" onclick="buyMetal()">Buy Metals</button></td>
            <td><button id="sellMetals" onclick="sellMetals()">Sell Metals</button></td>
            <td><button id="autoBuyMetal" onclick="toggleAutoMetal()">Auto Buy Metal</button></td>
            <td><input type="number" id="autoMetalNum" value="0" min="1" style="width: 50px;"></td>
          </tr>
          <tr>
            <td><button id="buyPlastics" onclick="buyPlastic()">Buy Plastics</button></td>
            <td><button id="sellPlastics" onclick="sellPlastics()">Sell Plastics</button></td>
            <td><button id="autoBuyPlastic" onclick="toggleAutoPlastic()">Auto Buy Plastic</button></td>
            <td><input type="number" id="autoPlasticNum" value="0" min="1" style="width: 50px;"></td>
          </tr>
          <tr>
            <td><button id="buyElectronics" onclick="buyElectronics()">Buy Electronics</button></td>
            <td><button id="sellElectronics" onclick="sellElectronics()">Sell Electronics</button></td>
            <td><button id="autoBuyElectronic" onclick="toggleAutoElectronic()">Auto Buy Electronic</button></td>
            <td><input type="number" id="autoElectronicNum" value="0" min="1" style="width: 50px;"></td>
          </tr>
        </table>




        

      </div>

    </div>
</body>
</html>
